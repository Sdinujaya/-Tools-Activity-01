<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Dark UI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Georgia","Segoe UI",sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f0f0f,#17130f,#1f1a14);
color:#fff;
}

.card{
width:400px;
padding:40px 34px;
border-radius:24px;
background:rgba(24,24,24,0.96);
border:1px solid rgba(212,175,55,0.18);
box-shadow:0 18px 50px rgba(0,0,0,0.45);
text-align:center;
}

h1{
font-size:40px;
margin-bottom:12px;
color:#f4d27a;
}

p{
color:#c7b78a;
margin-bottom:28px;
font-size:15px;
}

input{
width:100%;
height:56px;
border-radius:14px;
border:1px solid #3a3222;
background:#141414;
color:#f5f5f5;
padding:0 16px;
font-size:16px;
outline:none;
margin-bottom:18px;
}

button{
width:100%;
height:56px;
border:none;
border-radius:14px;
font-size:17px;
font-weight:600;
cursor:pointer;
background:linear-gradient(135deg,#b68a2f,#e0bd63);
color:#151515;
}
</style>
</head>

<body>

<div class="card">

<h1>Welcome</h1>
<p>Type your name and receive a warm greeting</p>

<form action="greeting.html" method="GET">
<input type="text" name="name" placeholder="Enter your name" required>
<button type="submit">Get Greeting</button>
</form>

</div>

</body>
</html>
